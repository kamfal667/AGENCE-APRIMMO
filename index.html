><label style=\"font-size:13px;font-weight:600;color:#3a4350;\">Nom <span style=\"color:#c0392b;\">*<\u002Fspan><\u002Flabel><input name=\"nom\" type=\"text\" placeholder=\"Votre nom\" style=\"height:46px;border:1.5px solid #cfd4db;border-radius:9px;padding:0 14px;font-size:14.5px;font-family:Inter;color:#3a4350;outline:none;transition:border-color .2s ease;\" style-focus=\"border-color:#1B3A6B\"><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px;\"><label style=\"font-size:13px;font-weight:600;color:#3a4350;\">Téléphone <span style=\"color:#c0392b;\">*<\u002Fspan><\u002Flabel><input name=\"tel\" type=\"tel\" placeholder=\"+225 ...\" style=\"height:46px;border:1.5px solid #cfd4db;border-radius:9px;padding:0 14px;font-size:14.5px;font-family:Inter;color:#3a4350;outline:none;transition:border-color .2s ease;\" style-focus=\"border-color:#1B3A6B\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n            <div style=\"display:flex;flex-direction:column;gap:7px;\"><label style=\"font-size:13px;font-weight:600;color:#3a4350;\">Email<\u002Flabel><input name=\"email\" type=\"email\" placeholder=\"vous@email.com\" style=\"height:46px;border:1.5px solid #cfd4db;border-radius:9px;padding:0 14px;font-size:14.5px;font-family:Inter;color:#3a4350;outline:none;transition:border-color .2s ease;\" style-focus=\"border-color:#1B3A6B\"><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px;\"><label style=\"font-size:13px;font-weight:600;color:#3a4350;\">Type de structure<\u002Flabel><select name=\"type\" style=\"height:46px;border:1.5px solid #cfd4db;border-radius:9px;padding:0 12px;font-size:14.5px;font-family:Inter;color:#3a4350;outline:none;background:#fff;cursor:pointer;transition:border-color .2s ease;\" style-focus=\"border-color:#1B3A6B\"><option>TPE<\u002Foption><option>PME<\u002Foption><option>Startup<\u002Foption><option>Particulier<\u002Foption><opti tify-content:center;flex:none;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C8A951\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 21 s7-6.2 7-11 a7 7 0 1 0-14 0 c0 4.8 7 11 7 11 Z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"2.5\"><\u002Fcircle><\u002Fsvg><\u002Fspan><div><div style=\"font-size:13px;color:#9fb1cc;margin-bottom:3px;\">Adresse<\u002Fdiv><div style=\"font-size:15px;\">[Adresse], Abidjan, Côte d'Ivoire<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:14px;\"><span style=\"width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C8A951\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 4 h3.5 l1.8 4.5-2.4 1.5 a12 12 0 0 0 5.1 5.1 l1.5-2.4 L19 16 v3.2 a1.6 1.6 0 0 1-1.8 1.6 A16 16 0 0 1 3.2 5.8 1.6 1.6 0 0 1 4.8 4 Z\"><\u002Fpath><\u002Fsvg><\u002Fspan><div><div style=\"font-size:13px;color:#9fb1cc;margin-bottom:3px;\">Téléphone<\u002Fdiv><div style=\"font-size:15px;\">{{ phone }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:14px;\"><span style=\"width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C8A951\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><polyline points=\"3.5,6.5 12,12.5 20.5,6.5\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><div><div style=\"font-size:13px;color:#9fb1cc;margin-bottom:3px;\">Email<\u002Fdiv><div style=\"font-size:15px;\">{{ email }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:14px;\"><span style=\"width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex:none;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C8A951\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"8\"><\u002Fcircle><polyline points=\"12,7.5 12,12 15,14\"><\u002Fpolyline><\u002Fsvg><\u002Fspan><div><div style=\"font-size:13px;color:#9fb1cc;margin-bottom:3px;\">Horaires<\u002Fdiv><div style=\"font-size:15px;\">Lun – Ven · 8h – 18h<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"{{ waLink }}\" target=\"_blank\" style=\"text-decoration:none;background:#1A7A4A;color:#fff;border-radius:14px;padding:20px 24px;display:flex;align-items:center;gap:14px;box-shadow:0 12px 28px rgba(26,122,74,.22);transition:transform .2s ease;\" style-hover=\"transform:translateY(-2px)\">\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M12 3 C7 3 3 6.6 3 11 c0 1.7 .6 3.3 1.7 4.6 L4 21 l5.6-1.6 c0.8 .2 1.6 .3 2.4 .3 5 0 9-3.6 9-8 S17 3 12 3 Z\"><\u002Fpath><\u002Fsvg>\n          <div><div style=\"font-weight:600;font-size:15.5px;\">Discuter sur WhatsApp<\u002Fdiv><div style=\"font-size:13px;opacity:.85;\">Réponse rapide pendant les horaires d'ouverture<\u002Fdiv><\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== FOOTER ===================== -->\n  <footer style=\"background:#13294c;color:#fff;padding:56px 0 28px;\">\n    <div data-grid-footer=\"\" style=\"max-width:1200px;margin:0 auto;padding:0 32px;display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:40px;\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:16px;\">\n          <div style=\"width:40px;height:40px;border-radius:9px;background:#fff;color:#1B3A6B;display:flex;align-items:center;justify-content:center;font-family:Merriweather,serif;font-weight:900;font-size:17px;\">CC<\u002Fdiv>\n          <div style=\"font-family:Merriweather,serif;font-weight:700;font-size:18px;\">{{ cabinetName }}<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.7;color:#9fb1cc;margin:0 0 14px;max-width:340px;\">Votre expert-comptable de confiance à Abidjan. Comptabilité, fiscalité et conseil pour les entreprises ivoiriennes.<\u002Fp>\n        <div style=\"font-size:12.5px;color:#7b91b3;\">Membre de l'Ordre des Experts-Comptables de Côte d'Ivoire<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:14px;font-weight:600;margin-bottom:16px;color:#cdd8e8;\">Liens rapides<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;\">\n          <a href=\"#services\" style=\"text-decoration:none;color:#9fb1cc;font-size:14px;\">Services<\u002Fa>\n          <a href=\"#processus\" style=\"text-decoration:none;color:#9fb1cc;font-size:14px;\">Processus<\u002Fa>\n          <a href=\"#faq\" style=\"text-decoration:none;color:#9fb1cc;font-size:14px;\">FAQ<\u002Fa>\n          <a href=\"#contact\" style=\"text-decoration:none;color:#9fb1cc;font-size:14px;\">Contact<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:14px;font-weight:600;margin-bottom:16px;color:#cdd8e8;\">Contact<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:14px;color:#9fb1cc;\">\n          <div>{{ phone }}<\u002Fdiv>\n          <div>{{ email }}<\u002Fdiv>\n          <div>[Adresse], Abidjan<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1200px;margin:36px auto 0;padding:22px 32px 0;border-top:1px solid rgba(255,255,255,.1);font-size:12.5px;color:#7b91b3;\">© 2026 {{ cabinetName }}. Tous droits réservés.<\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ===================== WHATSAPP FLOTTANT ===================== -->\n  <a href=\"{{ waLink }}\" target=\"_blank\" aria-label=\"WhatsApp\" style=\"position:fixed;bottom:26px;right:26px;z-index:60;width:60px;height:60px;border-radius:50%;background:#1A7A4A;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 28px rgba(26,122,74,.45);transition:transform .25s ease;\" style-hover=\"transform:scale(1.08)\">\n    <svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M12 3 C7 3 3 6.6 3 11 c0 1.7 .6 3.3 1.7 4.6 L4 21 l5.6-1.6 c0.8 .2 1.6 .3 2.4 .3 5 0 9-3.6 9-8 S17 3 12 3 Z\"><\u002Fpath><\u002Fsvg>\n  <\u002Fa>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1440 },\n  &quot;cabinetName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;ETHAM SERVICES PLUS&quot; },\n  &quot;expertName&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;[Expert-Comptable]&quot; },\n  &quot;phone&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;+225 07 00 00 00 00&quot; },\n  &quot;email&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;contact@votrecabinet.ci&quot; },\n  &quot;whatsapp&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2250700000000&quot; }\n}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const cabinetName = (this.props.cabinetName && this.props.cabinetName.trim()) || \"ETHAM SERVICES PLUS\";\n    const expertName = (this.props.expertName && this.props.expertName.trim()) || \"[Expert-Comptable]\";\n    const phone = (this.props.phone && this.props.phone.trim()) || \"+225 07 00 00 00 00\";\n    const email = (this.props.email && this.props.email.trim()) || \"contact@votrecabinet.ci\";\n    const waDigits = ((this.props.whatsapp || \"2250700000000\") + \"\").replace(/\\D/g, \"\");\n    const msg = \"Bonjour, je souhaite prendre rendez-vous pour un diagnostic comptable gratuit.\";\n    const waLink = \"https://wa.me/\" + waDigits + \"?text=\" + encodeURIComponent(msg);\n    return { cabinetName, expertName, phone, email, waLink };\n  }\n\n  componentDidMount() {\n    const root = document.getElementById(\"cc-site\");\n    if (!root) return;\n\n    // --- nav shadow on scroll ---\n    const nav = root.querySelector(\"[data-nav]\");\n    const onScroll = () => {\n      const y = window.scrollY || document.documentElement.scrollTop || 0;\n      if (nav) {\n        nav.style.boxShadow = y > 12 ? \"0 6px 24px rgba(27,58,107,.10)\" : \"none\";\n        nav.style.borderBottomColor = y > 12 ? \"#e6e9ee\" : \"transparent\";\n      }\n    };\n    window.addEventListener(\"scroll\", onScroll, { passive: true });\n    onScroll();\n\n    // --- mobile hamburger menu ---\n    const ham = root.querySelector(\"[data-hamburger]\");\n    const menu = root.querySelector(\"[data-mobilemenu]\");\n    const bars = root.querySelectorAll(\"[data-ham-l]\");\n    let menuOpen = false;\n    const setMenu = (open) => {\n      menuOpen = open;\n      if (menu) menu.style.display = open ? \"block\" : \"none\";\n      if (bars.length === 3) {\n        bars[0].style.transform = open ? \"translateY(7px) rotate(45deg)\" : \"none\";\n        bars[1].style.opacity = open ? \"0\" : \"1\";\n        bars[2].style.transform = open ? \"translateY(-7px) rotate(-45deg)\" : \"none\";\n      }\n    };\n    if (ham) ham.addEventListener(\"click\", () => setMenu(!menuOpen));\n    root.querySelectorAll(\"[data-mlink]\").forEach((l) => l.addEventListener(\"click\", () => setMenu(false)));\n    window.addEventListener(\"resize\", () => { if (window.innerWidth > 920 && menuOpen) setMenu(false); });\n\n    // --- reveal on scroll ---\n    if (\"IntersectionObserver\" in window) {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            e.target.style.opacity = \"1\";\n            e.target.style.transform = \"none\";\n            io.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.12, rootMargin: \"0px 0px -40px 0px\" });\n      root.querySelectorAll(\"[data-reveal]\").forEach((el) => io.observe(el));\n\n      // --- counters ---\n      const cio = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            this.animateCount(e.target);\n            cio.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.5 });\n      root.querySelectorAll(\"[data-count]\").forEach((c) => cio.observe(c));\n    } else {\n      root.querySelectorAll(\"[data-reveal]\").forEach((el) => { el.style.opacity = \"1\"; el.style.transform = \"none\"; });\n    }\n\n    // --- FAQ accordion ---\n    const items = Array.from(root.querySelectorAll(\"[data-faq]\"));\n    const closeItem = (it) => {\n      it.setAttribute(\"data-open\", \"0\");\n      const p = it.querySelector(\"[data-faq-panel]\");\n      const ic = it.querySelector(\"[data-faq-icon]\");\n      if (p) { p.style.maxHeight = \"0px\"; p.style.opacity = \"0\"; }\n      if (ic) ic.style.transform = \"rotate(0deg)\";\n      it.style.borderColor = \"#e2e6ec\";\n    };\n    const openItem = (it) => {\n      it.setAttribute(\"data-open\", \"1\");\n      const p = it.querySelector(\"[data-faq-panel]\");\n      const ic = it.querySelector(\"[data-faq-icon]\");\n      if (p) { p.style.maxHeight = p.scrollHeight + \"px\"; p.style.opacity = \"1\"; }\n      if (ic) ic.style.transform = \"rotate(45deg)\";\n      it.style.borderColor = \"#1B3A6B\";\n    };\n    items.forEach((it) => {\n      const head = it.querySelector(\"[data-faq-head]\");\n      if (!head) return;\n      head.addEventListener(\"click\", () => {\n        const isOpen = it.getAttribute(\"data-open\") === \"1\";\n        items.forEach(closeItem);\n        if (!isOpen) openItem(it);\n      });\n    });\n    if (items[0]) openItem(items[0]);\n\n    // --- contact form -> WhatsApp ---\n    const form = root.querySelector(\"[data-form]\");\n    if (form) {\n      form.addEventListener(\"submit\", (ev) => {\n        ev.preventDefault();\n        const get = (n) => {\n          const f = form.querySelector('[name=\"' + n + '\"]');\n          return f ? (f.value || \"\").trim() : \"\";\n        };\n        let ok = true;\n        [\"nom\", \"tel\"].forEach((n) => {\n          const f = form.querySelector('[name=\"' + n + '\"]');\n          if (!get(n)) { ok = false; if (f) f.style.borderColor = \"#c0392b\"; }\n          else if (f) { f.style.borderColor = \"#cfd4db\"; }\n        });\n        if (!ok) return;\n        const waDigits = ((this.props.whatsapp || \"2250700000000\") + \"\").replace(/\\D/g, \"\");\n        const lines = [\n          \"Bonjour, je souhaite un diagnostic comptable gratuit.\",\n          \"\",\n          \"Nom : \" + get(\"nom\"),\n          \"Téléphone : \" + get(\"tel\"),\n          \"Email : \" + (get(\"email\") || \"—\"),\n          \"Structure : \" + get(\"type\"),\n          \"Message : \" + (get(\"message\") || \"—\")\n        ].join(\"\\n\");\n        window.open(\"https://wa.me/\" + waDigits + \"?text=\" + encodeURIComponent(lines), \"_blank\");\n      });\n    }\n  }\n\n  animateCount(el) {\n    const target = parseFloat(el.getAttribute(\"data-count\")) || 0;\n    const prefix = el.getAttribute(\"data-prefix\") || \"\";\n    const suffix = el.getAttribute(\"data-suffix\") || \"\";\n    const dur = 1500;\n    const start = performance.now();\n    const fmt = (n) => (n >= 1000 ? Math.round(n).toLocaleString(\"fr-FR\") : Math.round(n).toString());\n    const step = (now) => {\n      const t = Math.min(1, (now - start) / dur);\n      const eased = 1 - Math.pow(1 - t, 3);\n      el.textContent = prefix + fmt(target * eased) + suffix;\n      if (t < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
